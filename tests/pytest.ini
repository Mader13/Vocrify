[pytest]
# Pytest configuration for Transcribe Video project

# Test discovery patterns
testpaths = unit/python integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external services)
    e2e: End-to-end tests (slowest, full system tests)
    slow: Tests that take a long time to run
    network: Tests that require network access
    download: Tests related to model downloads
    transcription: Tests related to transcription
    diarization: Tests related to speaker diarization
    security: Security-related tests
    performance: Performance and benchmarking tests
    benchmark: Benchmark tests (measure performance metrics)

# Coverage configuration
[coverage:run]
source = ../../ai-engine
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Timeout configuration
[pytest-timeout]
timeout = 300
timeout_method = thread

# Async configuration
[pytest-asyncio]
asyncio_mode = auto
