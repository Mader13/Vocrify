version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    rebase-strategy: 'disabled'
    groups:
      npm-production:
        dependency-type: 'production'
        patterns:
          - '*'
      npm-development:
        dependency-type: 'development'
        patterns:
          - '*'

  - package-ecosystem: 'cargo'
    directory: '/src-tauri'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '03:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    rebase-strategy: 'disabled'
    groups:
      cargo-all:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'wednesday'
      time: '03:00'
      timezone: 'UTC'
    open-pull-requests-limit: 1
    rebase-strategy: 'disabled'
    groups:
      github-actions-all:
        patterns:
          - '*'
