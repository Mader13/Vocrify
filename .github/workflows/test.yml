name: Tests

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        !startsWith(github.head_ref, 'dependabot/cargo/') &&
        !startsWith(github.head_ref, 'dependabot/github_actions/')
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2

      - name: Cache Bun packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: tests-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            tests-bun-${{ runner.os }}-

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile || {
            if [ "${{ startsWith(github.head_ref, 'dependabot/') }}" = "true" ]; then
              echo "Dependabot PR detected, regenerating bun.lock for CI"
              bun install
            else
              exit 1
            fi
          }

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun run test

  rust-tests:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        !startsWith(github.head_ref, 'dependabot/npm_and_yarn/') &&
        !startsWith(github.head_ref, 'dependabot/github_actions/')
      )
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest","windows-latest","macos-latest"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust tests
        run: cargo test --manifest-path=src-tauri/Cargo.toml --verbose

  workflow-sanity:
    name: Workflow Sanity
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'dependabot/github_actions/')

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate workflow YAML syntax
        run: |
          ruby -e 'require "yaml"; Dir.glob(".github/workflows/*.{yml,yaml}").each { |file| YAML.load_file(file) }; puts "Workflow YAML parsed successfully"'

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [frontend, rust-tests, workflow-sanity]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Checks | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Tests | ${{ needs.rust-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Sanity | ${{ needs.workflow-sanity.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any test failed
        if: |
          needs.frontend.result == 'failure' ||
          needs.rust-tests.result == 'failure' ||
          needs.workflow-sanity.result == 'failure'
        run: exit 1
