name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install JS dependencies
        run: bun install

      - name: Prepare Tauri resources
        run: bun run prepare:tauri-resources

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test

      - name: Build installer (NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Build raw executable for portable package
        run: bunx tauri build --no-bundle

      - name: Package portable ZIP
        run: bun run portable:pack

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocrify-windows-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocrify-windows-portable
          path: src-tauri/target/release/bundle/portable/*.zip
          retention-days: 7
