name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release-tag.outputs.tag }}
      release-version: ${{ steps.version.outputs.VERSION }}
      release-notes: ${{ steps.changelog.outputs.NOTES }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ steps.release-tag.outputs.tag }}" | sed 's/^VERSION=v/VERSION=/' >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md || echo "Release ${{ steps.release-tag.outputs.tag }}")
          echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  promote-build-artifacts:
    name: Promote Build Artifacts
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      promoted: ${{ steps.promote.outputs.promoted }}
    permissions:
      actions: read
      contents: read

    steps:
      - name: Try promoting artifacts from Build workflow
        id: promote
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -u

          RUN_ID=$(gh api "repos/$REPO/actions/workflows/build.yml/runs?status=completed&per_page=50" --jq ".workflow_runs | map(select(.head_sha == \"$COMMIT_SHA\" and .conclusion == \"success\")) | first | .id // empty" 2>/dev/null || true)

          if [ -z "$RUN_ID" ]; then
            echo "promoted=false" >> "$GITHUB_OUTPUT"
            echo "No successful Build run found for commit $COMMIT_SHA"
            exit 0
          fi

          echo "Found successful Build run $RUN_ID for commit $COMMIT_SHA"
          mkdir -p artifacts/windows-installer artifacts/windows-portable

          if gh run download "$RUN_ID" --repo "$REPO" --name vocrify-windows-installer --dir artifacts/windows-installer \
            && gh run download "$RUN_ID" --repo "$REPO" --name vocrify-windows-portable --dir artifacts/windows-portable; then
            echo "promoted=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          rm -rf artifacts
          echo "promoted=false" >> "$GITHUB_OUTPUT"
          echo "Build artifacts are unavailable in run $RUN_ID; fallback build will start"

      - name: Upload promoted installer artifact
        if: steps.promote.outputs.promoted == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installer
          path: artifacts/windows-installer/**
          retention-days: 7

      - name: Upload promoted portable artifact
        if: steps.promote.outputs.promoted == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-portable
          path: artifacts/windows-portable/**
          retention-days: 7

  build-artifacts:
    if: needs.promote-build-artifacts.outputs.promoted != 'true'
    name: Build Artifacts (windows-x64)
    needs: [prepare-release, promote-build-artifacts]
    uses: ./.github/workflows/windows-artifacts.yml
    with:
      run_checks: false
      installer_artifact_name: windows-installer
      portable_artifact_name: windows-portable
      tauri_target: x86_64-pc-windows-msvc
    secrets: inherit

  create-release:
    name: Create GitHub Release Draft
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release (draft)
        id: create-release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.release-tag }}
          release_name: Vocrify ${{ needs.prepare-release.outputs.release-tag }}
          body: ${{ needs.prepare-release.outputs.release-notes }}
          draft: true
          prerelease: false

  upload-release-assets:
    name: Upload Release Assets
    needs: [prepare-release, create-release, promote-build-artifacts, build-artifacts]
    if: |
      always() &&
      needs.create-release.result == 'success' &&
      (
        needs.promote-build-artifacts.outputs.promoted == 'true' ||
        needs.build-artifacts.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download portable ZIP artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: windows-portable
          path: artifacts/windows-portable

      - name: Upload artifacts to release draft
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release-tag }}
          draft: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/windows-portable/*.zip

  publish-release:
    name: Publish Release
    needs: [create-release, upload-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false
            });
