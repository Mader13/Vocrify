name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release-tag.outputs.tag }}
      release-version: ${{ steps.version.outputs.VERSION }}
      release-notes: ${{ steps.changelog.outputs.NOTES }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ steps.release-tag.outputs.tag }}" | sed 's/^VERSION=v/VERSION=/' >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md || echo "Release ${{ steps.release-tag.outputs.tag }}")
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-artifacts:
    name: Build Artifacts (windows-x64)
    needs: prepare-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-release-
            windows-cargo-

      - name: Install JS dependencies
        run: bun install

      - name: Prepare Tauri resources
        run: bun run prepare:tauri-resources

      - name: Build installer (NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Build raw executable for portable package
        run: bunx tauri build --no-bundle

      - name: Package portable ZIP
        run: bun run portable:pack

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: src-tauri/target/release/bundle/portable/*.zip
          retention-days: 7

  create-release:
    name: Create GitHub Release Draft
    needs: prepare-release
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release (draft)
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.release-tag }}
          release_name: Vocrify ${{ needs.prepare-release.outputs.release-tag }}
          body: ${{ needs.prepare-release.outputs.release-notes }}
          draft: true
          prerelease: false

  upload-release-assets:
    name: Upload Release Assets
    needs: [prepare-release, build-artifacts, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download NSIS artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download portable ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/windows-portable

      - name: Upload artifacts to release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release-tag }}
          draft: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/windows-portable/*.zip

  publish-release:
    name: Publish Release
    needs: [create-release, upload-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release-id }},
              draft: false
            });
